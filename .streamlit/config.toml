# .streamlit/config.toml
# Streamlit Web App 설정 파일
# 목적:
# - 한글 표시 안정화
# - 차트 렌더링 성능 개선
# - 배포 환경 최적화


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 서버 설정
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

[server]

# 파일 변경 시 자동 재실행
runOnSave = true

# 파일 업로드 최대 크기 (MB)
maxUploadSize = 500

# 포트 자동 설정
port = 8501

# 외부 접근 허용
enableCORS = false

# XSRF 보호 (배포 시 유지 권장)
enableXsrfProtection = true


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 브라우저 설정
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

[browser]

# 자동 브라우저 실행
gatherUsageStats = false


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 테마 설정 (UI 스타일)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

[theme]

# 기본 색상 (파랑 계열)
primaryColor = "#1f77b4"

# 배경색
backgroundColor = "#FFFFFF"

# 보조 배경색
secondaryBackgroundColor = "#F0F2F6"

# 텍스트 색상
textColor = "#262730"

# 기본 폰트
font = "sans serif"


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 로그 설정
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

[logger]

level = "info"


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 클라이언트 설정
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

[client]

# 툴바 표시 여부
toolbarMode = "auto"
